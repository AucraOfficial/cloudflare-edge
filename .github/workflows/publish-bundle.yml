name: Build and Publish Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install wrangler
        run: npm install wrangler@3

      - name: Build bundle
        run: npm run build

      - name: Upload bundle to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put cloudflare-sdk/${{ github.sha }}/worker-bundle --file=dist/bundle.js

      - name: Upload version to R2
        run: echo "${{ github.sha }}" > /tmp/version.txt && npx wrangler r2 object put cloudflare-sdk/version --file=/tmp/version.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
